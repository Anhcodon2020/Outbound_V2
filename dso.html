<script>
    let allData = []; // Biến lưu trữ toàn bộ dữ liệu
    let currentStatus = 1;

    // HÃ m render báº£ng dá»±a trÃªn dá»¯ liá»‡u Ä‘Ã£ lá»c
    function renderTable(data) {
        const tableBody = document.querySelector('#dsoTable tbody');
        tableBody.innerHTML = '';

        if (!data || data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center">ChÆ°a cÃ³ dá»¯ liá»‡u cho tráº¡ng thÃ¡i nÃ y</td></tr>';
            return;
        }

        data.forEach(item => {
            const row = document.createElement('tr');
            
            let statusHtml = '';
            if (item.status_dso == 1) statusHtml = '<span class="status-badge status-new">Open</span>';
            else if (item.status_dso == 3) statusHtml = '<span class="status-badge status-allocate">Allocate</span>';
            else if (item.status_dso == 7) statusHtml = '<span class="status-badge status-close">Close</span>';
            else statusHtml = `<span class="status-badge status-other">${item.status_dso || ''}</span>`;

            row.innerHTML = `<td>${item.id}</td><td>${item.release_key || ''}</td><td>${statusHtml}</td><td>${item.child_po || ''}</td>`;
            tableBody.appendChild(row);
        });
    }

    // HÃ m xá»­ lÃ½ khi báº¥m Tab
    function filterTab(status, btnElement) {\n        currentStatus = status;\n        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));\n        if (btnElement) btnElement.classList.add('active');\n        renderTable(currentFiltered());\n    }

    // Táº£i dá»¯ liá»‡u ban Ä‘áº§u
    fetch('/api/dso')
        .then(response => response.json())
        .then(data => {
            allData = data;
            // Máº·c Ä‘á»‹nh hiá»ƒn thá»‹ Tab Open (status = 1)
            const activeBtn = document.querySelector('.tab-btn.active');
            filterTab(1, activeBtn);
        })
        .catch(err => console.error('Lá»—i táº£i dá»¯ liá»‡u:', err));

    // --- HÃ€M Xá»¬ LÃ IMPORT EXCEL ---
    function importExcel() {
        const fileInput = document.getElementById('excelFile');
        const file = fileInput.files[0];

        if (!file) { alert('Vui lÃ²ng chá»n file Excel!'); return; }

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { raw: false });

            if (jsonData.length === 0) { alert('File Excel khÃ´ng cÃ³ dá»¯ liá»‡u!'); return; }

            console.log('Dá»¯ liá»‡u thÃ´:', jsonData);

            // Map dá»¯ liá»‡u theo yÃªu cáº§u: release_key, status, huser_defined_02
            const standardizedData = jsonData.map(row => ({
                release_key: row['release_key'],
                status: parseInt(row['status']) || 1,
                huser_defined_02: row['huser_defined_02'] // DÃ¹ng Ä‘á»ƒ insert vÃ o child_po
            }));

            uploadData(standardizedData);
        };
        reader.readAsArrayBuffer(file);
    }

    // --- UPLOAD Vá»šI PROGRESS BAR ---
    async function uploadData(data) {
        if (!confirm(`Báº¡n cÃ³ cháº¯c muá»‘n import ${data.length} dÃ²ng dá»¯ liá»‡u DSO?`)) return;

        const modal = document.getElementById('progressModal');
        const pBar = document.getElementById('progressBar');
        const pText = document.getElementById('progressText');
        const resultBox = document.getElementById('resultBox');
        
        modal.style.display = 'flex';
        resultBox.style.display = 'none';
        pBar.style.width = '0%';
        pText.innerText = 'Äang chuáº©n bá»‹...';

        const BATCH_SIZE = 50;
        let total = data.length;
        let processed = 0;
        let stats = { inserted: 0, updated: 0, errors: 0 };

        try {
            for (let i = 0; i < total; i += BATCH_SIZE) {
                const batch = data.slice(i, i + BATCH_SIZE);
                
                const response = await fetch('/api/dso/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(batch)
                });

                const result = await response.json();

                if (result.stats) {
                    stats.inserted += result.stats.inserted;
                    stats.updated += result.stats.updated;
                    stats.errors += result.stats.errors;
                }

                processed += batch.length;
                const percent = Math.min(100, Math.round((processed / total) * 100));
                pBar.style.width = percent + '%';
                pText.innerText = `Äang xá»­ lÃ½: ${percent}% (${processed}/${total})`;
            }

            pText.innerText = 'âœ… Xá»­ lÃ½ hoÃ n táº¥t!';
            pBar.style.backgroundColor = '#28a745';
            
            document.getElementById('countNew').innerText = stats.inserted;
            document.getElementById('countUpdate').innerText = stats.updated;
            document.getElementById('countError').innerText = stats.errors;
            resultBox.style.display = 'block';

        } catch (error) {
            console.error('Lá»—i import:', error);
            pText.innerText = 'âŒ CÃ³ lá»—i xáº£y ra!';
            pBar.style.backgroundColor = '#dc3545';
        }
    }
    function currentFiltered() {
        const term = document.getElementById(\"searchBox\").value.trim().toLowerCase();
        const filtered = allData.filter(item => item.status_dso == currentStatus);
        if (!term) return filtered;
        return filtered.filter(item => {
            return (item.release_key || "").toLowerCase().includes(term)
                || (item.child_po || "").toLowerCase().includes(term)
                || (item.sku || "").toLowerCase().includes(term);
        });
    }
</script>
